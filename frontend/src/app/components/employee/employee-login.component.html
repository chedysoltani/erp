<div class="employee-login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Connexion Employé</h1>
      <p class="login-subtitle">Accédez à votre espace de travail</p>
    </div>

    <form class="login-form" (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="employe@entreprise.com"
          required>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="••••••••"
          required>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button 
        type="submit" 
        class="login-btn" 
        [disabled]="isLoading">
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading">Connexion...</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Vous êtes un manager ?</p>
      <button class="switch-btn" (click)="goToManagerLogin()">
        Accès Manager
      </button>
    </div>
  </div>
</div>
